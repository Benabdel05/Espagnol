<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Español en casa — Apprendre l'espagnol</title>
  <meta name="description" content="Site personnel d'apprentissage de l'espagnol : vocabulaire, grammaire, exercices, test de positionnement et prononciation audio." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="app-shell">

    <!-- =====================  SIDEBAR  ===================== -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="tile" aria-hidden="true"></span>
        <div>
          <h1>Español en casa</h1>
          <span>Apprentissage personnel</span>
        </div>
      </div>

      <nav class="nav-list" id="nav-list" aria-label="Navigation principale"></nav>

      <button class="test-cta" id="open-test-btn" type="button">
        🎯 Test de positionnement
      </button>

      <div class="sidebar-footer">
        Projet personnel — Abdel<br>
        Synthèse vocale : Web Speech API
        <div style="margin-top:10px;">
          <button class="reset-link" id="reset-progress-btn" type="button">Réinitialiser ma progression</button>
        </div>
      </div>
    </aside>

    <!-- =====================  CONTENU PRINCIPAL  ===================== -->
    <main class="main" id="main-content" aria-live="polite">
      <!-- Rempli dynamiquement par js/app.js -->
    </main>

  </div>

  <!-- =====================  OVERLAY : TEST DE POSITIONNEMENT  ===================== -->
  <div class="exercise-overlay" id="test-overlay" style="display:none;">
    <div class="exercise-card">
      <button class="ex-close" id="test-close-btn" type="button" aria-label="Fermer le test">✕</button>
      <div id="test-body"><!-- Rempli dynamiquement par js/test.js --></div>
    </div>
  </div>

  <!-- =====================  OVERLAY : EXERCICES  ===================== -->
  <div class="exercise-overlay" id="exercise-overlay" style="display:none;">
    <div class="exercise-card">
      <button class="ex-close" id="exercise-close-btn" type="button" aria-label="Fermer les exercices">✕</button>
      <div id="exercise-body"><!-- Rempli dynamiquement par js/exercise-ui.js --></div>
    </div>
  </div>

  <!-- Ordre de chargement : données d'abord, puis modules utilitaires, puis UI -->
  <script src="data/vocabulary.js"></script>
  <script src="data/grammar.js"></script>
  <script src="data/placement-test.js"></script>

  <script src="js/progress.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/exercises.js"></script>

  <script src="js/exercise-ui.js"></script>
  <script src="js/test.js"></script>
  <script src="js/app.js"></script>

  <script>
    document.getElementById("reset-progress-btn").addEventListener("click", function () {
      if (confirm("Voulez-vous vraiment réinitialiser toute votre progression ? Cette action est irréversible.")) {
        window.Progress.reset();
        if (window.appRerender) window.appRerender();
        var nav = document.getElementById("nav-list");
        if (nav) nav.dispatchEvent(new Event("refresh"));
        location.reload();
      }
    });
  </script>
</body>
</html>
